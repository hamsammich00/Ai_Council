<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Council Controller</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <h1>Distributed AI Council</h1>
        <button id="themeToggle" class="theme-toggle" type="button">Dark Mode</button>
      </header>

      <section class="prompt-card">
        <label for="runMode">Mode</label>
        <select id="runMode">
          <option value="council">Council</option>
          <option value="engineer">Engineer</option>
          <option value="architect">Architect</option>
          <option value="security">Security</option>
          <option value="judge">Judge</option>
        </select>

        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="Ask the council..." rows="8"></textarea>
        <button id="runBtn">Run Council</button>
        <p id="loading" class="loading hidden">Council is deliberating...</p>
      </section>

      <section class="results-grid">
        <article class="panel">
          <h2>Engineer</h2>
          <p class="panel-meta" id="engineerMeta"></p>
          <pre id="engineer">No response yet.</pre>
        </article>

        <article class="panel">
          <h2>Security</h2>
          <p class="panel-meta" id="securityMeta"></p>
          <pre id="security">No response yet.</pre>
        </article>

        <article class="panel">
          <h2>Architect</h2>
          <p class="panel-meta" id="architectMeta"></p>
          <pre id="architect">No response yet.</pre>
        </article>

        <article class="panel panel-final">
          <h2>Final Decision (Judge)</h2>
          <p class="panel-meta" id="finalMeta"></p>
          <pre id="final">No response yet.</pre>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
